[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql",
    "php82Extensions.mbstring",
    "php82Extensions.xml",
    "php82Extensions.bcmath",
    "php82Extensions.fileinfo",
    "php82Extensions.tokenizer",
    "php82Extensions.openssl",
    "php82Extensions.curl",
    "php82Extensions.gd",
    "php82Extensions.zip",
    "composer",
    "nodejs_20"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan storage:link --force && php artisan serve --host 0.0.0.0 --port $PORT"
